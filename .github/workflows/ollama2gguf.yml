name: ollama-model-to-gguf

on:
  workflow_dispatch:
    inputs:
      model_name:
        description: "Ollama model name (e.g. phi3:mini, llama3.2:latest)"
        required: true
        type: string
        default: "qwen3-embedding:4b"
      # gguf_outtype removed — quantization is detected automatically from the model

jobs:
  convert-and-release:
    runs-on: windows-latest

    permissions:
      contents: write

    defaults:
      run:
        shell: pwsh

    env:
      OLLAMA_MODELS: ${{ github.workspace }}/.ollama/models

    concurrency:
      group: ollama-gguf-${{ inputs.model_name }}
      cancel-in-progress: false

    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          $ErrorActionPreference = 'Stop'
          python -m pip install --upgrade pip
          if (Test-Path "requirements.txt") {
            python -m pip install -r requirements.txt
          } else {
            python -m pip install gguf
          }

      - name: Ensure Ollama models directory exists
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path "$env:OLLAMA_MODELS" | Out-Null

      - name: Install Ollama (Windows via winget)
        run: |
          $ErrorActionPreference = 'Stop'
          $maxTries = 3
          for ($t = 1; $t -le $maxTries; $t++) {
            try {
              winget install -e --id Ollama.Ollama --source winget `
                --accept-package-agreements --accept-source-agreements --disable-interactivity
              break
            } catch {
              if ($t -eq $maxTries) { throw }
              Write-Host "winget attempt $t failed. Retrying in 5s..."
              Start-Sleep -Seconds 5
            }
          }

          $ollamaDir = "$env:LOCALAPPDATA\Programs\Ollama"
          if (Test-Path $ollamaDir) {
            "$ollamaDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            $env:PATH = "$ollamaDir;$env:PATH"
          }

          ollama --version

      - name: Start Ollama server
        run: |
          $ErrorActionPreference = 'Stop'
          Get-Process ollama* -ErrorAction SilentlyContinue |
            Stop-Process -Force -ErrorAction SilentlyContinue

          $log = Join-Path $env:GITHUB_WORKSPACE "ollama-serve.log"
          $p = Start-Process -FilePath "ollama" -ArgumentList "serve" -PassThru `
               -RedirectStandardOutput $log -RedirectStandardError $log

          Start-Sleep -Seconds 1
          if ($p.HasExited) {
            Write-Error "ollama serve exited early (code $($p.ExitCode))"
            Get-Content $log -ErrorAction SilentlyContinue | Select-Object -Last 50
            exit 1
          }

          $ready = $false
          for ($i = 0; $i -lt 60; $i++) {
            try {
              Invoke-RestMethod -Uri "http://localhost:11434/api/tags" `
                -Method GET -TimeoutSec 2 -ErrorAction Stop | Out-Null
              Write-Host "Ollama API is up."
              $ready = $true
              break
            } catch {
              Write-Host "Waiting for Ollama server... ($i)"
              Start-Sleep -Seconds 1
            }
          }
          if (-not $ready) {
            Write-Error "Ollama server failed to become ready in time."
            Get-Content $log -ErrorAction SilentlyContinue | Select-Object -Last 50
            exit 1
          }

      - name: Pull model from Ollama registry
        env:
          MODEL_NAME: ${{ inputs.model_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "Pulling $env:MODEL_NAME ..."
          ollama pull "$env:MODEL_NAME"
          ollama ls

      # ── NEW: ask Ollama's API what quantization level the pulled model has ──
      - name: Detect model quantization level
        id: detect_quant
        env:
          MODEL_NAME: ${{ inputs.model_name }}
        run: |
          $ErrorActionPreference = 'Stop'

          $body = @{ model = $env:MODEL_NAME } | ConvertTo-Json
          $info = Invoke-RestMethod -Uri "http://localhost:11434/api/show" `
                    -Method POST `
                    -ContentType "application/json" `
                    -Body $body

          # details.quantization_level is e.g. "Q4_K_M", "Q8_0", "F16"
          $quant = $info.details.quantization_level

          if ([string]::IsNullOrWhiteSpace($quant)) {
            Write-Warning "quantization_level not found in API response; falling back to 'unknown'"
            $quant = "unknown"
          }

          # Normalize to lowercase for filenames/tags (e.g. Q4_K_M -> q4_k_m)
          $quantLower = $quant.ToLowerInvariant()

          Write-Host "Detected quantization: $quant"

          "GGUF_OUTTYPE=$quantLower" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Inspect Ollama model storage
        run: |
          if (Test-Path "$env:OLLAMA_MODELS") {
            Get-ChildItem -Recurse "$env:OLLAMA_MODELS" |
              Select-Object FullName, Length | Format-List
          } else {
            Write-Warning "Models directory not found."
          }

      - name: Derive model id, tag and slug
        id: model_parts
        env:
          MODEL_NAME_INPUT: ${{ inputs.model_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          $full = $env:MODEL_NAME_INPUT

          if ($full -like "*:*") {
            $parts = $full.Split(":", 2)
            $modelId = $parts[0]
            $modelTag = $parts[1]
          } else {
            $modelId = $full
            $modelTag = "latest"
          }

          # Normalize slug: lowercase, replace :, /, whitespace → -, strip rest
          $slug = $full.ToLowerInvariant()
          $slug = $slug -replace "[:/\s]+", "-"
          $slug = $slug -replace "[^a-z0-9._-]", "-"
          $slug = $slug.Trim("-")

          "MODEL_ID=$modelId"   | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MODEL_TAG=$modelTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MODEL_SLUG=$slug"    | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

     - name: Extract (and merge if sharded) GGUF from Ollama blob cache
        env:
          MODEL_NAME: ${{ inputs.model_name }}
        run: |
          $ErrorActionPreference = 'Stop'

          $outFile = "model-$env:MODEL_ID-$env:MODEL_TAG-$env:GGUF_OUTTYPE.gguf"

          # Get all FROM lines from the modelfile
          $modelfile = ollama show --modelfile "$env:MODEL_NAME"
          Write-Host "Modelfile:`n$modelfile"

          $fromLines = $modelfile -split "`n" |
            Where-Object { $_ -match '^\s*FROM\s+/' -or $_ -match '^\s*FROM\s+[A-Za-z]:' } |
            ForEach-Object { ($_ -replace '^\s*FROM\s+', '').Trim() }

          if (-not $fromLines) {
            Write-Error "No blob FROM lines found in modelfile."
            exit 1
          }

          Write-Host "Found $($fromLines.Count) blob(s)."

          if ($fromLines.Count -eq 1) {
            # ── Single blob: verify magic and copy directly ──────────────────
            $blobPath = $fromLines[0]
            $magic = [System.Text.Encoding]::ASCII.GetString(
              [System.IO.File]::ReadAllBytes($blobPath)[0..3])
            if ($magic -ne "GGUF") {
              Write-Error "Blob '$blobPath' is not a GGUF file (magic bytes: '$magic')."
              exit 1
            }
            Copy-Item -Path $blobPath -Destination $outFile
            Write-Host "Copied single GGUF blob to $outFile"

          } else {
            # ── Multiple blobs: rename to expected shard naming scheme,
            #    then merge with gguf-split ───────────────────────────────────
            $total = $fromLines.Count
            $shardPaths = @()
            for ($i = 0; $i -lt $total; $i++) {
              $blobPath = $fromLines[$i]
              # gguf-split expects: name-NNNNN-of-NNNNN.gguf
              $shardName = "shard-{0:D5}-of-{1:D5}.gguf" -f ($i + 1), $total
              Copy-Item -Path $blobPath -Destination $shardName
              $shardPaths += $shardName
              Write-Host "Shard $($i+1)/$total : $blobPath -> $shardName"
            }

            # gguf-split --merge takes the first shard and output prefix
            $mergePrefix = "model-merged"
            gguf-split --merge $shardPaths[0] $mergePrefix
            
            # gguf-split outputs a single file named <prefix>.gguf
            $mergedFile = Get-ChildItem "${mergePrefix}*.gguf" | Select-Object -First 1
            if (-not $mergedFile) {
              Write-Error "gguf-split --merge did not produce an output file."
              exit 1
            }
            Rename-Item -Path $mergedFile.FullName -NewName $outFile
            Write-Host "Merged $total shards into $outFile"

            # Clean up temporary shard copies
            $shardPaths | ForEach-Object { Remove-Item $_ -ErrorAction SilentlyContinue }
          }

          if (-not (Test-Path $outFile)) {
            Write-Error "Output file '$outFile' was not created."
            exit 1
          }

          "GGUF_FILE=$outFile" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Get-Item $outFile | Format-List

      - name: Compute SHA256 checksum
        run: |
          $ErrorActionPreference = 'Stop'
          Get-FileHash "$env:GGUF_FILE" -Algorithm SHA256 |
            ForEach-Object {
              "$($_.Hash.ToLower())  $($_.Path | Split-Path -Leaf)"
            } | Out-File -Encoding utf8 model-gguf.sha256
          Get-Content model-gguf.sha256

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          # Tag includes detected quant so each quantization gets its own release
          tag_name: ollama-${{ env.MODEL_SLUG }}-${{ env.GGUF_OUTTYPE }}
          target_commitish: ${{ github.sha }}
          name: "GGUF for ${{ inputs.model_name }} (${{ env.GGUF_OUTTYPE }})"
          fail_on_unmatched_files: true
          files: |
            ${{ env.GGUF_FILE }}
            model-gguf.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
