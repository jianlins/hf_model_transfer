name: ollama-model-to-gguf

on:
  workflow_dispatch:
    inputs:
      model_name:
        description: "Ollama model name (e.g. phi3:mini, llama3.2:latest)"
        required: true
        type: string
        default: "qwen3-embedding:4b"
      split_size:
        description: "7zip volume size in MB (default 800 to stay under GitHub 2 GiB limit)"
        required: false
        type: string
        default: "800"

jobs:
  convert-and-release:
    runs-on: windows-latest

    permissions:
      contents: write

    defaults:
      run:
        shell: pwsh

    concurrency:
      group: ollama-gguf-${{ inputs.model_name }}
      cancel-in-progress: false

    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          $ErrorActionPreference = 'Stop'
          python -m pip install --upgrade pip
          if (Test-Path "requirements.txt") {
            python -m pip install -r requirements.txt
          } else {
            python -m pip install gguf
          }

      - name: Install 7zip
        run: |
          $ErrorActionPreference = 'Stop'
          choco install 7zip -y
          # Ensure 7z is on PATH for subsequent steps
          $sevenZipDir = "C:\Program Files\7-Zip"
          if (Test-Path $sevenZipDir) {
            "$sevenZipDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            $env:PATH = "$sevenZipDir;$env:PATH"
          }
          7z i | Select-Object -First 2
        env:
          ChocolateyInstall: "C:\\ProgramData\\chocolatey"

      - name: Install Ollama (Windows via winget)
        run: |
          $ErrorActionPreference = 'Stop'
          $maxTries = 3
          for ($t = 1; $t -le $maxTries; $t++) {
            try {
              winget install -e --id Ollama.Ollama --source winget `
                --accept-package-agreements --accept-source-agreements --disable-interactivity
              break
            } catch {
              if ($t -eq $maxTries) { throw }
              Write-Host "winget attempt $t failed. Retrying in 5s..."
              Start-Sleep -Seconds 5
            }
          }

          $ollamaDir = "$env:LOCALAPPDATA\Programs\Ollama"
          if (Test-Path $ollamaDir) {
            "$ollamaDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            $env:PATH = "$ollamaDir;$env:PATH"
          }

          ollama --version

      - name: Start Ollama server
        run: |
          $ErrorActionPreference = 'Stop'
          Get-Process ollama* -ErrorAction SilentlyContinue |
            Stop-Process -Force -ErrorAction SilentlyContinue

          # Do NOT set a custom OLLAMA_MODELS — use the default user-profile path
          # so OllamaToGGUF.py finds blobs in the same place ollama pull wrote them.
          Remove-Item Env:OLLAMA_MODELS -ErrorAction SilentlyContinue

          $logOut = Join-Path $env:GITHUB_WORKSPACE "ollama-serve-stdout.log"
          $logErr = Join-Path $env:GITHUB_WORKSPACE "ollama-serve-stderr.log"

          $p = Start-Process -FilePath "ollama" -ArgumentList "serve" -PassThru `
              -RedirectStandardOutput $logOut -RedirectStandardError $logErr

          Start-Sleep -Seconds 1
          if ($p.HasExited) {
            Write-Error "ollama serve exited early (code $($p.ExitCode))"
            Get-Content $logOut, $logErr -ErrorAction SilentlyContinue | Select-Object -Last 50
            exit 1
          }

          $ready = $false
          for ($i = 0; $i -lt 60; $i++) {
            try {
              Invoke-RestMethod -Uri "http://localhost:11434/api/tags" `
                -Method GET -TimeoutSec 2 -ErrorAction Stop | Out-Null
              Write-Host "Ollama API is up."
              $ready = $true
              break
            } catch {
              Write-Host "Waiting for Ollama server... ($i)"
              Start-Sleep -Seconds 1
            }
          }
          if (-not $ready) {
            Write-Error "Ollama server failed to become ready in time."
            Get-Content $logOut, $logErr -ErrorAction SilentlyContinue | Select-Object -Last 50
            exit 1
          }

      - name: Pull model from Ollama registry
        env:
          MODEL_NAME: ${{ inputs.model_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "Pulling $env:MODEL_NAME ..."
          ollama pull "$env:MODEL_NAME"
          ollama ls

      - name: Detect model quantization level
        id: detect_quant
        env:
          MODEL_NAME: ${{ inputs.model_name }}
        run: |
          $ErrorActionPreference = 'Stop'

          $body = @{ model = $env:MODEL_NAME } | ConvertTo-Json
          $info = Invoke-RestMethod -Uri "http://localhost:11434/api/show" `
                    -Method POST `
                    -ContentType "application/json" `
                    -Body $body

          $quant = $info.details.quantization_level

          if ([string]::IsNullOrWhiteSpace($quant)) {
            Write-Warning "quantization_level not found in API response; falling back to 'unknown'"
            $quant = "unknown"
          }

          $quantLower = $quant.ToLowerInvariant()
          Write-Host "Detected quantization: $quant"

          "GGUF_OUTTYPE=$quantLower" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Derive model id, tag and slug
        id: model_parts
        env:
          MODEL_NAME_INPUT: ${{ inputs.model_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          $full = $env:MODEL_NAME_INPUT

          if ($full -like "*:*") {
            $parts = $full.Split(":", 2)
            $modelId  = $parts[0]
            $modelTag = $parts[1]
          } else {
            $modelId  = $full
            $modelTag = "latest"
          }

          $slug = $full.ToLowerInvariant()
          $slug = $slug -replace "[:/\s]+", "-"
          $slug = $slug -replace "[^a-z0-9._-]", "-"
          $slug = $slug.Trim("-")

          "MODEL_ID=$modelId"   | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MODEL_TAG=$modelTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MODEL_SLUG=$slug"    | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Convert Ollama model to GGUF
        env:
          MODEL_NAME: ${{ inputs.model_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          $outFile = "model-$env:MODEL_ID-$env:MODEL_TAG-$env:GGUF_OUTTYPE.gguf"

          # Point OllamaToGGUF.py to the default path where ollama pull stored blobs
          $env:OLLAMA_MODELS = "$env:USERPROFILE\.ollama\models"
          Write-Host "OLLAMA_MODELS = $env:OLLAMA_MODELS"
          Write-Host "Running OllamaToGGUF.py for '$env:MODEL_NAME' -> '$outFile'"

          python OllamaToGGUF.py "$env:MODEL_NAME" "$outFile"

          if (-not (Test-Path $outFile)) {
            Write-Host "--- Searching for any .gguf files for debug ---"
            Get-ChildItem -Recurse -Filter "*.gguf" -ErrorAction SilentlyContinue |
              Select-Object FullName
            Write-Error "OllamaToGGUF.py did not produce '$outFile'."
            exit 1
          }

          "GGUF_FILE=$outFile" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Get-Item $outFile | Format-List

      - name: Compute SHA256 checksum
        run: |
          $ErrorActionPreference = 'Stop'
          Get-FileHash "$env:GGUF_FILE" -Algorithm SHA256 |
            ForEach-Object {
              "$($_.Hash.ToLower())  $($_.Path | Split-Path -Leaf)"
            } | Out-File -Encoding utf8 model-gguf.sha256
          Get-Content model-gguf.sha256

      - name: Split GGUF into volumes with 7zip
        run: |
          $ErrorActionPreference = 'Stop'
          $splitMB  = "${{ inputs.split_size }}"
          $archive  = "volumes\$env:MODEL_SLUG-$env:GGUF_OUTTYPE.7z"

          New-Item -ItemType Directory -Force -Path "volumes" | Out-Null

          Write-Host "Splitting '$env:GGUF_FILE' into ${splitMB}MB volumes -> $archive"
          7z a -v${splitMB}m "$archive" "$env:GGUF_FILE" "model-gguf.sha256"

          Write-Host "`n--- Volume listing ---"
          Get-ChildItem volumes | Select-Object Name, @{N='MB';E={[math]::Round($_.Length/1MB,1)}}

          # Count volumes produced
          $count = (Get-ChildItem volumes).Count
          Write-Host "Total volume files: $count"
          "VOLUME_COUNT=$count" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ollama-${{ env.MODEL_SLUG }}-${{ env.GGUF_OUTTYPE }}
          release_name: "GGUF for ${{ inputs.model_name }} (${{ env.GGUF_OUTTYPE }})"
          draft: false
          prerelease: false
          body: |
            ## ${{ inputs.model_name }} — ${{ env.GGUF_OUTTYPE }} GGUF

            | Field | Value |
            |---|---|
            | Ollama model | `${{ inputs.model_name }}` |
            | Quantization | `${{ env.GGUF_OUTTYPE }}` |
            | Archive format | 7zip split volumes (`${{ inputs.split_size }} MB` each) |
            | Volume count | ${{ env.VOLUME_COUNT }} files |

            ### How to reassemble
            Download **all** `.7z.*` volume files plus `model-gguf.sha256`, then run:
            ```bash
            # Linux / macOS
            7z x <archive>.7z.001

            # Windows
            7z x <archive>.7z.001
            ```
            Verify integrity with the included SHA256 checksum file.

      - name: Upload volumes to release (batch 1 — files 1–38)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs   = require('fs');
            const path = require('path');

            const releaseId = '${{ steps.create_release.outputs.id }}';
            const volDir    = 'D:/volumes';   // absolute path for reliability

            // Re-read from workspace-relative path if D:/volumes not populated
            const dir = fs.existsSync(volDir) ? volDir : path.join(process.env.GITHUB_WORKSPACE, 'volumes');
            const files = fs.readdirSync(dir).sort();
            const batch = files.slice(0, 38);

            console.log(`Uploading batch 1: ${batch.length} file(s)`);
            for (const file of batch) {
              const filePath = path.join(dir, file);
              console.log(`  Uploading: ${file} (${(fs.statSync(filePath).size / 1e6).toFixed(1)} MB)`);
              await github.rest.repos.uploadReleaseAsset({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                release_id: releaseId,
                name:       file,
                data:       fs.readFileSync(filePath),
              });
            }

      - name: Upload volumes to release (batch 2 — files 39–76)
        if: env.VOLUME_COUNT > 38
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs   = require('fs');
            const path = require('path');

            const releaseId = '${{ steps.create_release.outputs.id }}';
            const volDir    = 'D:/volumes';
            const dir = fs.existsSync(volDir) ? volDir : path.join(process.env.GITHUB_WORKSPACE, 'volumes');
            const files = fs.readdirSync(dir).sort();
            const batch = files.slice(38, 76);

            if (batch.length === 0) { console.log('No files for batch 2.'); return; }
            console.log(`Uploading batch 2: ${batch.length} file(s)`);
            for (const file of batch) {
              const filePath = path.join(dir, file);
              console.log(`  Uploading: ${file}`);
              await github.rest.repos.uploadReleaseAsset({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                release_id: releaseId,
                name:       file,
                data:       fs.readFileSync(filePath),
              });
            }

      - name: Upload volumes to release (batch 3 — files 77+)
        if: env.VOLUME_COUNT > 76
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs   = require('fs');
            const path = require('path');

            const releaseId = '${{ steps.create_release.outputs.id }}';
            const volDir    = 'D:/volumes';
            const dir = fs.existsSync(volDir) ? volDir : path.join(process.env.GITHUB_WORKSPACE, 'volumes');
            const files = fs.readdirSync(dir).sort();
            const batch = files.slice(76);

            if (batch.length === 0) { console.log('No files for batch 3.'); return; }
            console.log(`Uploading batch 3: ${batch.length} file(s)`);
            for (const file of batch) {
              const filePath = path.join(dir, file);
              console.log(`  Uploading: ${file}`);
              await github.rest.repos.uploadReleaseAsset({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                release_id: releaseId,
                name:       file,
                data:       fs.readFileSync(filePath),
              });
            }
