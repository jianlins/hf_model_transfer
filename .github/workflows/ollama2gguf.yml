name: ollama-model-to-gguf

on:
  workflow_dispatch:
    inputs:
      model_name:
        description: "Ollama model name (e.g. phi3:mini, llama3.2:latest)"
        required: true
        type: string
        default: "qwen3-embedding:4b"

jobs:
  convert-and-release:
    runs-on: windows-latest

    permissions:
      contents: write

    defaults:
      run:
        shell: pwsh

    env:
      OLLAMA_MODELS: ${{ github.workspace }}/.ollama/models

    concurrency:
      group: ollama-gguf-${{ inputs.model_name }}
      cancel-in-progress: false

    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          $ErrorActionPreference = 'Stop'
          python -m pip install --upgrade pip
          if (Test-Path "requirements.txt") {
            python -m pip install -r requirements.txt
          } else {
            python -m pip install gguf
          }

      - name: Download OllamaToGGUF.py
        run: |
          $ErrorActionPreference = 'Stop'
          Invoke-WebRequest `
            -Uri "https://raw.githubusercontent.com/casual-drivel/OllamaToGGUF-MemoryFix/refs/heads/main/OllamaToGGUF.py" `
            -OutFile "OllamaToGGUF.py"
          Write-Host "Downloaded OllamaToGGUF.py"

      - name: Ensure Ollama models directory exists
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path "$env:OLLAMA_MODELS" | Out-Null

      - name: Install Ollama (Windows via winget)
        run: |
          $ErrorActionPreference = 'Stop'
          $maxTries = 3
          for ($t = 1; $t -le $maxTries; $t++) {
            try {
              winget install -e --id Ollama.Ollama --source winget `
                --accept-package-agreements --accept-source-agreements --disable-interactivity
              break
            } catch {
              if ($t -eq $maxTries) { throw }
              Write-Host "winget attempt $t failed. Retrying in 5s..."
              Start-Sleep -Seconds 5
            }
          }

          $ollamaDir = "$env:LOCALAPPDATA\Programs\Ollama"
          if (Test-Path $ollamaDir) {
            "$ollamaDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            $env:PATH = "$ollamaDir;$env:PATH"
          }

          ollama --version

      - name: Start Ollama server
        run: |
          $ErrorActionPreference = 'Stop'
          Get-Process ollama* -ErrorAction SilentlyContinue |
            Stop-Process -Force -ErrorAction SilentlyContinue

          $logOut = Join-Path $env:GITHUB_WORKSPACE "ollama-serve-stdout.log"
          $logErr = Join-Path $env:GITHUB_WORKSPACE "ollama-serve-stderr.log"

          $p = Start-Process -FilePath "ollama" -ArgumentList "serve" -PassThru `
              -RedirectStandardOutput $logOut -RedirectStandardError $logErr

          Start-Sleep -Seconds 1
          if ($p.HasExited) {
            Write-Error "ollama serve exited early (code $($p.ExitCode))"
            Get-Content $logOut, $logErr -ErrorAction SilentlyContinue | Select-Object -Last 50
            exit 1
          }

          $ready = $false
          for ($i = 0; $i -lt 60; $i++) {
            try {
              Invoke-RestMethod -Uri "http://localhost:11434/api/tags" `
                -Method GET -TimeoutSec 2 -ErrorAction Stop | Out-Null
              Write-Host "Ollama API is up."
              $ready = $true
              break
            } catch {
              Write-Host "Waiting for Ollama server... ($i)"
              Start-Sleep -Seconds 1
            }
          }
          if (-not $ready) {
            Write-Error "Ollama server failed to become ready in time."
            Get-Content $logOut, $logErr -ErrorAction SilentlyContinue | Select-Object -Last 50
            exit 1
          }

      - name: Pull model from Ollama registry
        env:
          MODEL_NAME: ${{ inputs.model_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "Pulling $env:MODEL_NAME ..."
          ollama pull "$env:MODEL_NAME"
          ollama ls

      - name: Detect model quantization level
        id: detect_quant
        env:
          MODEL_NAME: ${{ inputs.model_name }}
        run: |
          $ErrorActionPreference = 'Stop'

          $body = @{ model = $env:MODEL_NAME } | ConvertTo-Json
          $info = Invoke-RestMethod -Uri "http://localhost:11434/api/show" `
                    -Method POST `
                    -ContentType "application/json" `
                    -Body $body

          $quant = $info.details.quantization_level

          if ([string]::IsNullOrWhiteSpace($quant)) {
            Write-Warning "quantization_level not found in API response; falling back to 'unknown'"
            $quant = "unknown"
          }

          $quantLower = $quant.ToLowerInvariant()
          Write-Host "Detected quantization: $quant"

          "GGUF_OUTTYPE=$quantLower" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Derive model id, tag and slug
        id: model_parts
        env:
          MODEL_NAME_INPUT: ${{ inputs.model_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          $full = $env:MODEL_NAME_INPUT

          if ($full -like "*:*") {
            $parts = $full.Split(":", 2)
            $modelId  = $parts[0]
            $modelTag = $parts[1]
          } else {
            $modelId  = $full
            $modelTag = "latest"
          }

          $slug = $full.ToLowerInvariant()
          $slug = $slug -replace "[:/\s]+", "-"
          $slug = $slug -replace "[^a-z0-9._-]", "-"
          $slug = $slug.Trim("-")

          "MODEL_ID=$modelId"   | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MODEL_TAG=$modelTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MODEL_SLUG=$slug"    | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Convert Ollama model to GGUF via OllamaToGGUF.py
        env:
          MODEL_NAME: ${{ inputs.model_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          $outFile = "model-$env:MODEL_ID-$env:MODEL_TAG-$env:GGUF_OUTTYPE.gguf"

          # OllamaToGGUF.py reads Ollama's manifest + blobs directly.
          # Pass OLLAMA_MODELS so it finds models in the workspace cache dir.
          $env:OLLAMA_MODELS = "$env:OLLAMA_MODELS"

          Write-Host "Running OllamaToGGUF.py for '$env:MODEL_NAME' -> '$outFile'"
          python OllamaToGGUF.py "$env:MODEL_NAME" "$outFile"

          if (-not (Test-Path $outFile)) {
            Write-Error "OllamaToGGUF.py did not produce '$outFile'."
            exit 1
          }

          "GGUF_FILE=$outFile" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Get-Item $outFile | Format-List

      - name: Compute SHA256 checksum
        run: |
          $ErrorActionPreference = 'Stop'
          Get-FileHash "$env:GGUF_FILE" -Algorithm SHA256 |
            ForEach-Object {
              "$($_.Hash.ToLower())  $($_.Path | Split-Path -Leaf)"
            } | Out-File -Encoding utf8 model-gguf.sha256
          Get-Content model-gguf.sha256

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ollama-${{ env.MODEL_SLUG }}-${{ env.GGUF_OUTTYPE }}
          target_commitish: ${{ github.sha }}
          name: "GGUF for ${{ inputs.model_name }} (${{ env.GGUF_OUTTYPE }})"
          fail_on_unmatched_files: true
          files: |
            ${{ env.GGUF_FILE }}
            model-gguf.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
